<!DOCTYPE html>
<html>
<head>
    <title>Shrinidhi S | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f4f6f9;
            color: #333;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1518779578993-ec3579fee39f');
            background-size: cover;
            background-position: center;
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero h1 {
            font-size: 48px;
        }

        .hero p {
            margin-top: 15px;
            font-size: 18px;
            max-width: 600px;
        }

        .buttons {
            margin-top: 25px;
        }

        .buttons a {
            text-decoration: none;
            padding: 10px 20px;
            margin: 10px;
            border: 2px solid white;
            color: white;
            border-radius: 5px;
            transition: 0.3s;
        }

        .buttons a:hover {
            background: white;
            color: black;
        }

        section {
            padding: 60px 20px;
            max-width: 1000px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 40px;
            color: #1f2937;
        }

        /* Certificates */
        .certificates {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .certificates img {
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .certificates img:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #111827;
            color: white;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Shrinidhi S</h1>
        <p>
            Computer Science Engineering Student with strong academic performance (CGPA: 9.8),
            passionate about software development, adaptive systems, and data-driven solutions.
        </p>

        <div class="buttons">
            <a href="#certificates">Certificates</a>
            <a href="#contact">Contact</a>
        </div>
    </div>

    <section id="certificates">
        <h2>Certificates</h2>

        <div class="certificates">
            <img src="images/certificate1.jpg">
            <img src="images/certificate2.jpg">
        </div>
    </section>

    <section id="contact">
        <h2>Contact</h2>
        <p style="text-align:center;">Email: sshrinidhi125@gmail.com</p>
    </section>

    <footer>
        © 2026 Shrinidhi S | Portfolio
    </footer>

</body>
</html>
